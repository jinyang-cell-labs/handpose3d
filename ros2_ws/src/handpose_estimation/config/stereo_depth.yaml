stereo_depth_node:
  ros__parameters:
    camera_names: ["camera0", "camera1"]
    # ApproximateTimeSynchronizer tolerance for pairing the two views.
    sync_slop: 0.05
    sync_queue_size: 10

    # ---------------- StereoSGBM matcher --------------------------------- #
    # num_disparities must be a multiple of 16; block_size odd. A larger
    # disparity range sees closer objects but costs CPU and crops one edge
    # of the depth map (left edge for a horizontal pair, top for vertical).
    # Closest visible depth ~= f * B / num_disparities.
    min_disparity: 0
    num_disparities: 128
    block_size: 5
    uniqueness_ratio: 10
    speckle_window_size: 100
    speckle_range: 2
    disp12_max_diff: 1

    # ---------------- depth output ---------------------------------------- #
    # Validity clamps (metres); depth outside -> NaN. Also the color range
    # for stereo/depth_color (near=red, far=blue).
    min_depth: 0.1
    max_depth: 5.0
    publish_depth_color: true
    # Rectified left view (bgr8) on stereo/image_rect — useful to sanity-check
    # the rectification and to color the DepthCloud display.
    publish_rectified: true
