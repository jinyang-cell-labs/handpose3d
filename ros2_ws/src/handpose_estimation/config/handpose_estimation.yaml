handpose_node:
  ros__parameters:
    camera_names: ["camera0", "camera1"]
    model_path: "/workspace/ros2_ws/src/handpose_estimation/models/hand_landmarker.task"
    extrinsics_file: "/workspace/ros2_ws/src/handpose_estimation/config/extrinsics.yaml"
    world_frame: "world"
    num_hands: 1
    min_hand_detection_confidence: 0.5
    min_hand_presence_confidence: 0.5
    min_tracking_confidence: 0.5
    # ApproximateTimeSynchronizer tolerance for pairing the two views.
    sync_slop: 0.05
    sync_queue_size: 10
    # Calibration world units -> metres for RViz-friendly marker sizing.
    scale: 0.05
    joint_size: 0.02
    line_width: 0.01
    publish_annotated: true
